        width: 100%;
        height: 100%;

        display: flex;
        flex-direction: column;

        justify-content: center;

      .loader-text {
        color: #ff9ecd;

      function initThree() {
        const container = document.getElementById("canvas-container");
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 70;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        container.appendChild(renderer.domElement);
        clock = new THREE.Clock();
      }

        const renderScene = new RenderPass(scene, camera);
        bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1,
          0.2,
          0.99,
        );
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
      }

      function initInstancedMesh(cnt) {
        const geo = new THREE.IcosahedronGeometry(CONFIG.particleSize, 0);
        const mat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 1,
          depthWrite: false,
        });
        instancedMesh = new THREE.InstancedMesh(geo, mat, cnt);
        pCurrent = new Float32Array(cnt * 3);
        pTarget = new Float32Array(cnt * 3);
        pScatter = new Float32Array(cnt * 3);
        mainGroup = new THREE.Group();
        mainGroup.add(instancedMesh);
        scene.add(mainGroup);
      }

      function setupSlideshow() {
        slideshowGroup = new THREE.Group();
        slideshowGroup.position.z = 10;
        scene.add(slideshowGroup);

        const loader = new THREE.TextureLoader();

        // Tạo 2 bộ ảnh để cuộn vô tận (Lặp lại danh sách)

              new THREE.PlaneGeometry(20, 26),
              new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0,
              }),
            );

              new THREE.PlaneGeometry(18, 18),
              new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                opacity: 0,
                color: 0xffffff,
              }),

            photo.position.set(0, 1.5, 0.1);

            group.position.x = i * CONFIG.slideGap;
            group.userData = {
              mats: [card.material, photo.material],
              originalX: i * CONFIG.slideGap,
            };
            slideshowGroup.add(group);
          });
        });
      }

      function setupMessageMesh() {
        new THREE.TextureLoader().load(IMGS.LETTER, (tex) => {
          const aspect = tex.image.width / tex.image.height;

          // --- CHỈNH SỬA Ở ĐÂY ---
          // Thay 35 hoặc 45 bằng 22 để thu nhỏ lại
          const meshHeight = 12;
          const meshWidth = meshHeight * aspect;

          messageMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(meshWidth, meshHeight),
            new THREE.MeshBasicMaterial({
              map: tex,
              transparent: true,
              opacity: 0,
              depthTest: false,
            }),
          );

          // Đặt vị trí Z là 50 để nó nổi lên trên cùng khi hiện ra
          messageMesh.position.set(0, 0, 50);
          messageMesh.renderOrder = 999;
          scene.add(messageMesh);
        });
      }
      // --- CÁC HÀM TIỆN ÍCH GIỮ NGUYÊN ---
      function setupFloatingStars() {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(300);
        for (let i = 0; i < 300; i++) pos[i] = (Math.random() - 0.5) * 300;
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        starSystem = new THREE.Points(
          geo,
          new THREE.PointsMaterial({
            color: 0xffccdd,
            size: 1,
            transparent: true,
            opacity: 0.5,
            map: createCircleTexture(),
          }),
        );
        scene.add(starSystem);
      }
      function setupWhiteStars() {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(450);
        for (let i = 0; i < 450; i++) pos[i] = (Math.random() - 0.5) * 400;
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        whiteStarSystem = new THREE.Points(
          geo,
          new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.5,
            transparent: true,
            opacity: 0.4,
            map: createCircleTexture(),
          }),
        );
        scene.add(whiteStarSystem);
      }
      function setupAuraRing() {
        const geometry = new THREE.BufferGeometry();
        const count = 300;
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const r = 45 + (Math.random() - 0.5) * 8;
          const t = Math.random() * Math.PI * 2;
          pos[i * 3] = r * Math.cos(t);
          pos[i * 3 + 1] = r * Math.sin(t) * 0.7;
          pos[i * 3 + 2] = (Math.random() - 0.5) * 20;
        }
        geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        auraRingSystem = new THREE.Points(
          geometry,
          new THREE.PointsMaterial({
            color: 0xffaadd,
            size: 0.8,
            map: createCircleTexture(),
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
          }),
        );
        scene.add(auraRingSystem);
      }
      function createCircleTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext("2d");
        const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        grad.addColorStop(0, "white");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(canvas);
      }
      function loadImage(url, id) {
        return new Promise((res) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = url;
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = 400;
            canvas.height = 400 * (img.height / img.width);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            imagesData[id] = {
              data: ctx.getImageData(0, 0, canvas.width, canvas.height).data,
              w: canvas.width,
              h: canvas.height,
            };
            res();
          };
        });
      }
      function useImageData(id) {
        const d = imagesData[id];
        if (!d) return;
        const valid = [];
        for (let i = 0; i < d.data.length; i += 4)
          if (d.data[i + 3] > 50) valid.push(i);
        const active = Math.min(CONFIG.maxCount, valid.length);
        instancedMesh.count = active;
        const step = valid.length / active;
        for (let i = 0; i < active; i++) {
          const idx = valid[Math.floor(i * step)];
          const px = (idx / 4) % d.w;
          const py = Math.floor(idx / 4 / d.w);
          pTarget[i * 3] = (px / d.w - 0.5) * 60;
          pTarget[i * 3 + 1] = -(py / d.h - 0.5) * 60 * (d.h / d.w);
          pTarget[i * 3 + 2] = (Math.random() - 0.5) * 2;
          const r = Math.random() * Math.PI * 2;
          const dist = 100 + Math.random() * 50;
          pScatter[i * 3] = Math.cos(r) * dist;
          pScatter[i * 3 + 1] = Math.sin(r) * dist;
          pScatter[i * 3 + 2] = (Math.random() - 0.5) * 100;
          _tempColor
            .setRGB(
              d.data[idx] / 255,
              d.data[idx + 1] / 255,
              d.data[idx + 2] / 255,
            )
            .lerp(_targetColor, 0.1);
          instancedMesh.setColorAt(i, _tempColor);
        }
        instancedMesh.instanceColor.needsUpdate = true;
      }
      function setupAudioSystem() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const source = ctx.createMediaElementSource(
          document.getElementById("audio-bg"),
        );
        audioAnalyser = ctx.createAnalyser();
        source.connect(audioAnalyser);
        audioAnalyser.connect(ctx.destination);
        audioDataArray = new Uint8Array(audioAnalyser.frequencyBinCount);
        isAudioSetup = true;
      }
      function initVisualizer2D() {
        visualizerCanvas = document.getElementById("visualizer-canvas");
        visualizerCtx = visualizerCanvas.getContext("2d");
        visualizerCanvas.width = visualizerCanvas.offsetWidth;
        visualizerCanvas.height = visualizerCanvas.offsetHeight;
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const time = clock.getElapsedTime();
        let bass = 0;
        if (isAudioSetup) {
          audioAnalyser.getByteFrequencyData(audioDataArray);
          let sum = 0;
          for (let i = 0; i < 20; i++) sum += audioDataArray[i];
          bass = sum / 20 / 255;
          drawVisualizer();
        }
        updateLogic(dt, time, bass);
        composer.render();
      }

      function updateLogic(dt, time, bass) {
        let targetOp = 1.0,
          targetBloom = 0.2,
          move = "TARGET";
        const guide = document.getElementById("guide-text");
        const h1 = document.getElementById("main-title");

        switch (appState) {
          case "FOX":
            guide.innerHTML =
              "Click để biến hình <span class='highlight'>✨</span>";
            break;
          case "TRANSITION_TO_PEN":
            targetOp = 0;
            targetBloom = 4;
            move = "SCATTER";
            if (currentOpacity < 0.05) {
              useImageData(2);
              appState = "REASSEMBLING_PEN";
            }
            break;
          case "REASSEMBLING_PEN":
            move = "TARGET";
            if (currentOpacity > 0.95) appState = "PEN";
            break;
          case "PEN":
            guide.innerHTML =
              "Click để mở thư <span class='highlight'>💌</span>";
            break;
          case "READING_LETTER":
            targetOp = 0;
            h1.classList.add("hide-title");
            guide.innerHTML =
              "Click để xem ảnh <span class='highlight'>📸</span>";
            animLetter.scale += (1 - animLetter.scale) * 3 * dt;
            if (messageMesh) {
              messageMesh.scale.setScalar(animLetter.scale);
              messageMesh.material.opacity = animLetter.scale;
              messageMesh.rotation.z = Math.sin(time * 0.5) * 0.05;
            }
            break;
          case "SLIDESHOW":
            targetOp = 0;
            h1.classList.remove("hide-title");
            guide.innerHTML = "ebe... ✨";

            if (messageMesh) {
              messageMesh.material.opacity +=
                (0 - messageMesh.material.opacity) * 5 * dt;
              messageMesh.scale.setScalar(0);
            }

            // --- LOGIC CUỘN VÔ TẬN ---
            slideScrollX += CONFIG.slideSpeed * dt;

            // Khi cuộn hết 1 chu kỳ (hết danh sách ảnh gốc), reset về 0 để lặp lại
            if (slideScrollX >= totalWidth) {
              slideScrollX = 0;
            }

            if (slideshowGroup) {
              // Di chuyển group ngược chiều X để tạo hiệu ứng trượt
              slideshowGroup.position.x = -slideScrollX;

              slideshowGroup.children.forEach((g) => {
                // Hiện dần ảnh
                g.userData.mats.forEach(
                  (m) => (m.opacity += (1 - m.opacity) * 2 * dt),
                );
              });
            }
            break;
        }

        currentOpacity += (targetOp - currentOpacity) * 2 * dt;
        bloomPass.strength += (targetBloom - bloomPass.strength) * 2 * dt;

        const dummy = new THREE.Object3D();
        for (let i = 0; i < instancedMesh.count; i++) {
          const tx = move === "TARGET" ? pTarget[i * 3] : pScatter[i * 3];
          const ty =
            move === "TARGET" ? pTarget[i * 3 + 1] : pScatter[i * 3 + 1];
          const tz =
            move === "TARGET" ? pTarget[i * 3 + 2] : pScatter[i * 3 + 2];
          pCurrent[i * 3] += (tx - pCurrent[i * 3]) * 3 * dt;
          pCurrent[i * 3 + 1] += (ty - pCurrent[i * 3 + 1]) * 3 * dt;
          pCurrent[i * 3 + 2] += (tz - pCurrent[i * 3 + 2]) * 3 * dt;
          dummy.position.set(
            pCurrent[i * 3],
            pCurrent[i * 3 + 1] + Math.sin(time + i * 0.1) * 0.2,
            pCurrent[i * 3 + 2],
          );
          dummy.updateMatrix();
          instancedMesh.setMatrixAt(i, dummy.matrix);
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.material.opacity = currentOpacity;

        if (auraRingSystem) {
          auraRingSystem.rotation.z += dt * 0.2;
          auraRingSystem.scale.setScalar(1 + bass * 0.5);
        }
        if (starSystem) starSystem.position.y -= dt * 5;
      }

      function drawVisualizer() {
        const w = visualizerCanvas.width,
          h = visualizerCanvas.height;
        visualizerCtx.clearRect(0, 0, w, h);
        const barW = (w / audioDataArray.length) * 2.5;
        for (let i = 0; i < audioDataArray.length; i += 2) {
          const barH = (audioDataArray[i] / 255) * h;
          visualizerCtx.fillStyle = `rgba(255,150,200,0.8)`;
          visualizerCtx.fillRect(
            w / 2 + (i * barW) / 2,
            h / 2 - barH / 2,
            barW,
            barH,
          );
          visualizerCtx.fillRect(
            w / 2 - (i * barW) / 2,
            h / 2 - barH / 2,
            barW,
            barH,
          );
        }
      }

      function hideLoading() {
        const el = document.getElementById("loading-screen");
        el.style.opacity = 0;
        setTimeout(() => el.remove(), 1000);
      }
      init();

      let mainGroup, instancedMesh, messageMesh, slideshowGroup;
      let starSystem, whiteStarSystem, auraRingSystem;
      let pCurrent, pTarget, pScatter;
      let isAudioSetup = false,
        audioAnalyser,
        audioDataArray,
        visualizerCtx,
        visualizerCanvas;

      let appState = "FOX";
      let interactionLock = 0;
      let slideScrollX = 0;
      let totalWidth = SLIDE_IMAGES.length * CONFIG.slideGap;

      let imagesData = {
        1: { data: null, w: 0, h: 0 },
        2: { data: null, w: 0, h: 0 },
      };
      let currentOpacity = 1.0;
      let animLetter = { scale: 0 };
      const _tempColor = new THREE.Color();
      const _targetColor = new THREE.Color(0xff69b4);

      async function init() {
        initThree();
        setupPostProcessing();
        setupMessageMesh();
        setupSlideshow();
        initInstancedMesh(CONFIG.maxCount);
        setupFloatingStars();
        setupWhiteStars();
        setupAuraRing();

        await Promise.all([loadImage(IMGS.FOX, 1), loadImage(IMGS.PEN, 2)]);
        useImageData(1);

        initVisualizer2D();
        hideLoading();
        animate();

        // --- TỰ ĐỘNG CHẠY AUDIO KHI LOAD XONG ---
        autoPlayAudio();

        window.addEventListener("mousedown", (e) => {
          if (e.button === 0) handleInteraction();
        });
        window.addEventListener("touchstart", () => handleInteraction());
      }

      function autoPlayAudio() {
        const bg = document.getElementById("audio-bg");
        if (bg) {
          bg.play()
            .then(() => {
              if (!isAudioSetup) setupAudioSystem();
            })
            .catch(() => {
              console.log("Trình duyệt yêu cầu click để phát nhạc.");
            });
        }
      }

      function handleInteraction() {
        if (Date.now() < interactionLock) return;

        // Đảm bảo audio chạy nếu autoplay bị chặn
        if (!isAudioSetup) {
          setupAudioSystem();
          const bg = document.getElementById("audio-bg");
          if (bg) bg.play().catch(() => {});
        }

        if (appState === "FOX") {
          appState = "TRANSITION_TO_PEN";
        } else if (appState === "PEN") {
          appState = "READING_LETTER";
          const audioLetter = document.getElementById("audio-letter");
          if (audioLetter) audioLetter.play();
        } else if (appState === "READING_LETTER") {
          appState = "SLIDESHOW";
        }
        interactionLock = Date.now() + 1200;
      }

      function initThree() {
        const container = document.getElementById("canvas-container");
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          50,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 70;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        container.appendChild(renderer.domElement);
        clock = new THREE.Clock();
      }

      function setupPostProcessing() {
        const renderScene = new RenderPass(scene, camera);
        bloomPass = new UnrealBloomPass(
          new THREE.Vector2(window.innerWidth, window.innerHeight),
          1,
          0.2,
          0.99,
        );
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
      }

      function initInstancedMesh(cnt) {
        const geo = new THREE.IcosahedronGeometry(CONFIG.particleSize, 0);
        const mat = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 1,
          depthWrite: false,
        });
        instancedMesh = new THREE.InstancedMesh(geo, mat, cnt);
        pCurrent = new Float32Array(cnt * 3);
        pTarget = new Float32Array(cnt * 3);
        pScatter = new Float32Array(cnt * 3);
        mainGroup = new THREE.Group();
        mainGroup.add(instancedMesh);
        scene.add(mainGroup);
      }

      function setupSlideshow() {
        slideshowGroup = new THREE.Group();
        slideshowGroup.position.z = 10;
        scene.add(slideshowGroup);
        const loader = new THREE.TextureLoader();
        const imagesToLoad = [...SLIDE_IMAGES, ...SLIDE_IMAGES];
        imagesToLoad.forEach((path, i) => {
          loader.load(path, (tex) => {
            const group = new THREE.Group();
            const card = new THREE.Mesh(
              new THREE.PlaneGeometry(20, 26),
              new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0,
              }),
            );
            const photo = new THREE.Mesh(
              new THREE.PlaneGeometry(18, 18),
              new THREE.MeshBasicMaterial({
                map: tex,
                transparent: true,
                opacity: 0,
                color: 0xffffff,
              }),
            );
            photo.position.set(0, 1.5, 0.1);
            group.add(card, photo);
            group.position.x = i * CONFIG.slideGap;
            group.userData = {
              mats: [card.material, photo.material],
              originalX: i * CONFIG.slideGap,
            };
            slideshowGroup.add(group);
          });
        });
      }

      function setupMessageMesh() {
        new THREE.TextureLoader().load(IMGS.LETTER, (tex) => {
          const aspect = tex.image.width / tex.image.height;
          const meshHeight = 12;
          const meshWidth = meshHeight * aspect;
          messageMesh = new THREE.Mesh(
            new THREE.PlaneGeometry(meshWidth, meshHeight),
            new THREE.MeshBasicMaterial({
              map: tex,
              transparent: true,
              opacity: 0,
              depthTest: false,
            }),
          );
          messageMesh.position.set(0, 0, 50);
          messageMesh.renderOrder = 999;
          scene.add(messageMesh);
        });
      }

      function setupFloatingStars() {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(300);
        for (let i = 0; i < 300; i++) pos[i] = (Math.random() - 0.5) * 300;
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        starSystem = new THREE.Points(
          geo,
          new THREE.PointsMaterial({
            color: 0xffccdd,
            size: 1,
            transparent: true,
            opacity: 0.5,
            map: createCircleTexture(),
          }),
        );
        scene.add(starSystem);
      }

      function setupWhiteStars() {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(450);
        for (let i = 0; i < 450; i++) pos[i] = (Math.random() - 0.5) * 400;
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        whiteStarSystem = new THREE.Points(
          geo,
          new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.5,
            transparent: true,
            opacity: 0.4,
            map: createCircleTexture(),
          }),
        );
        scene.add(whiteStarSystem);
      }

      function setupAuraRing() {
        const geometry = new THREE.BufferGeometry();
        const count = 300;
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const r = 45 + (Math.random() - 0.5) * 8;
          const t = Math.random() * Math.PI * 2;
          pos[i * 3] = r * Math.cos(t);
          pos[i * 3 + 1] = r * Math.sin(t) * 0.7;
          pos[i * 3 + 2] = (Math.random() - 0.5) * 20;
        }
        geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        auraRingSystem = new THREE.Points(
          geometry,
          new THREE.PointsMaterial({
            color: 0xffaadd,
            size: 0.8,
            map: createCircleTexture(),
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending,
          }),
        );
        scene.add(auraRingSystem);
      }

      function createCircleTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext("2d");
        const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        grad.addColorStop(0, "white");
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(canvas);
      }

      function loadImage(url, id) {
        return new Promise((res) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.src = url;
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = 400;
            canvas.height = 400 * (img.height / img.width);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            imagesData[id] = {
              data: ctx.getImageData(0, 0, canvas.width, canvas.height).data,
              w: canvas.width,
              h: canvas.height,
            };
            res();
          };
        });
      }

      function useImageData(id) {
        const d = imagesData[id];
        if (!d) return;
        const valid = [];
        for (let i = 0; i < d.data.length; i += 4)
          if (d.data[i + 3] > 50) valid.push(i);
        const active = Math.min(CONFIG.maxCount, valid.length);
        instancedMesh.count = active;
        const step = valid.length / active;
        for (let i = 0; i < active; i++) {
          const idx = valid[Math.floor(i * step)];
          const px = (idx / 4) % d.w;
          const py = Math.floor(idx / 4 / d.w);
          pTarget[i * 3] = (px / d.w - 0.5) * 60;
          pTarget[i * 3 + 1] = -(py / d.h - 0.5) * 60 * (d.h / d.w);
          pTarget[i * 3 + 2] = (Math.random() - 0.5) * 2;
          const r = Math.random() * Math.PI * 2;
          const dist = 100 + Math.random() * 50;
          pScatter[i * 3] = Math.cos(r) * dist;
          pScatter[i * 3 + 1] = Math.sin(r) * dist;
          pScatter[i * 3 + 2] = (Math.random() - 0.5) * 100;
          _tempColor
            .setRGB(
              d.data[idx] / 255,
              d.data[idx + 1] / 255,
              d.data[idx + 2] / 255,
            )
            .lerp(_targetColor, 0.1);
          instancedMesh.setColorAt(i, _tempColor);
        }
        instancedMesh.instanceColor.needsUpdate = true;
      }

      function setupAudioSystem() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        const source = ctx.createMediaElementSource(
          document.getElementById("audio-bg"),
        );
        audioAnalyser = ctx.createAnalyser();
        source.connect(audioAnalyser);
        audioAnalyser.connect(ctx.destination);
        audioDataArray = new Uint8Array(audioAnalyser.frequencyBinCount);
        isAudioSetup = true;
      }

      function initVisualizer2D() {
        visualizerCanvas = document.getElementById("visualizer-canvas");
        visualizerCtx = visualizerCanvas.getContext("2d");
        visualizerCanvas.width = visualizerCanvas.offsetWidth;
        visualizerCanvas.height = visualizerCanvas.offsetHeight;
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        const time = clock.getElapsedTime();
        let bass = 0;
        if (isAudioSetup) {
          audioAnalyser.getByteFrequencyData(audioDataArray);
          let sum = 0;
          for (let i = 0; i < 20; i++) sum += audioDataArray[i];
          bass = sum / 20 / 255;
          drawVisualizer();
        }
        updateLogic(dt, time, bass);
        composer.render();
      }

      function updateLogic(dt, time, bass) {
        let targetOp = 1.0,
          targetBloom = 0.2,
          move = "TARGET";
        const guide = document.getElementById("guide-text");
        const h1 = document.getElementById("main-title");

        switch (appState) {
          case "FOX":
            guide.innerHTML =
              "Click để biến hình <span class='highlight'>✨</span>";
            break;
          case "TRANSITION_TO_PEN":
            targetOp = 0;
            targetBloom = 4;
            move = "SCATTER";
            if (currentOpacity < 0.05) {
              useImageData(2);
              appState = "REASSEMBLING_PEN";
            }
            break;
          case "REASSEMBLING_PEN":
            move = "TARGET";
            if (currentOpacity > 0.95) appState = "PEN";
            break;
          case "PEN":
            guide.innerHTML =
              "Click để mở thư <span class='highlight'>💌</span>";
            break;
          case "READING_LETTER":
            targetOp = 0;
            h1.classList.add("hide-title");
            guide.innerHTML =
              "Click để xem ảnh <span class='highlight'>📸</span>";
            animLetter.scale += (1 - animLetter.scale) * 3 * dt;
            if (messageMesh) {
              messageMesh.scale.setScalar(animLetter.scale);
              messageMesh.material.opacity = animLetter.scale;
              messageMesh.rotation.z = Math.sin(time * 0.5) * 0.05;
            }
            break;
          case "SLIDESHOW":
            targetOp = 0;
            h1.classList.remove("hide-title");
            guide.innerHTML = "ebe... ✨";
            if (messageMesh) {
              messageMesh.material.opacity +=
                (0 - messageMesh.material.opacity) * 5 * dt;
              messageMesh.scale.setScalar(0);
            }
            slideScrollX += CONFIG.slideSpeed * dt;
            if (slideScrollX >= totalWidth) slideScrollX = 0;
            if (slideshowGroup) {
              slideshowGroup.position.x = -slideScrollX;
              slideshowGroup.children.forEach((g) => {
                g.userData.mats.forEach(
                  (m) => (m.opacity += (1 - m.opacity) * 2 * dt),
                );
              });
            }
            break;
        }

        currentOpacity += (targetOp - currentOpacity) * 2 * dt;
        bloomPass.strength += (targetBloom - bloomPass.strength) * 2 * dt;

        const dummy = new THREE.Object3D();
        for (let i = 0; i < instancedMesh.count; i++) {
          const tx = move === "TARGET" ? pTarget[i * 3] : pScatter[i * 3];
          const ty =
            move === "TARGET" ? pTarget[i * 3 + 1] : pScatter[i * 3 + 1];
          const tz =
            move === "TARGET" ? pTarget[i * 3 + 2] : pScatter[i * 3 + 2];
          pCurrent[i * 3] += (tx - pCurrent[i * 3]) * 3 * dt;
          pCurrent[i * 3 + 1] += (ty - pCurrent[i * 3 + 1]) * 3 * dt;
          pCurrent[i * 3 + 2] += (tz - pCurrent[i * 3 + 2]) * 3 * dt;
          dummy.position.set(
            pCurrent[i * 3],
            pCurrent[i * 3 + 1] + Math.sin(time + i * 0.1) * 0.2,
            pCurrent[i * 3 + 2],
          );
          dummy.updateMatrix();
          instancedMesh.setMatrixAt(i, dummy.matrix);
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.material.opacity = currentOpacity;

        if (auraRingSystem) {
          auraRingSystem.rotation.z += dt * 0.2;
          auraRingSystem.scale.setScalar(1 + bass * 0.5);
        }
        if (starSystem) starSystem.position.y -= dt * 5;
      }

      function drawVisualizer() {
        const w = visualizerCanvas.width,
          h = visualizerCanvas.height;
        visualizerCtx.clearRect(0, 0, w, h);
        const barW = (w / audioDataArray.length) * 2.5;
        for (let i = 0; i < audioDataArray.length; i += 2) {
          const barH = (audioDataArray[i] / 255) * h;
          visualizerCtx.fillStyle = `rgba(255,150,200,0.8)`;
          visualizerCtx.fillRect(
            w / 2 + (i * barW) / 2,
            h / 2 - barH / 2,
            barW,
            barH,
          );
          visualizerCtx.fillRect(
            w / 2 - (i * barW) / 2,
            h / 2 - barH / 2,
            barW,
            barH,
          );
        }
      }

      function hideLoading() {
        const el = document.getElementById("loading-screen");
        el.style.opacity = 0;
        setTimeout(() => el.remove(), 1000);
      }
      init();
    </script>
  </body>
</html>
